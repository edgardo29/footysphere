name: CI

on:
  pull_request:
    branches: [ main, dev ]

jobs:
  frontend-build:
    name: Frontend builds
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
      - name: Install deps
        run: npm ci
      - name: Build
        run: npm run build

  backend-smoke:
    name: Backend smoke check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps (if present)
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else echo "no requirements.txt"; fi
      - name: Import main.py (smoke)
        run: |
          python -c "import app.main; print('Imported backend app.main OK')"

